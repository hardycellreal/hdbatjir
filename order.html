    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="setting.js"></script>
</head>
<body class="bg-gray-50">

    <div class="container mx-auto px-4 py-6 max-w-lg">
        <h2 class="text-2xl font-bold mb-6 text-center">📝 Form Pemesanan</h2>

                    <option value="18500">Free Fire 140 Diamond - Rp 18.500</option>
                    <option value="31500">Free Fire 210 Diamond - Rp 31.500</option>
                    <option value="45046">Free Fire 355 Diamond - Rp 45.046</option>
                    <option value="72073">Free Fire 510 Diamond - Rp 72.073</option>
                    <option value="90600">Free Fire 720 Diamond - Rp 90.600</option>
                    <option value="183000">Free Fire 1450 Diamond - Rp 183.000</option>
                    <option value="279000">Free Fire 2180 Diamond - Rp 279.000</option>
                    <option value="464500">Free Fire 3640 Diamond - Rp 464.500</option>

                    <!-- ========================================== -->
                    <!-- LIST DANA -->
                    <!-- ========================================== -->
                    <option value="1000">DANA 1000 - Rp 1.000</option>
                    <option value="2000">DANA 2000 - Rp 2.000</option>
                    <option value="3000">DANA 3000 - Rp 3.000</option>
                    <option value="4000">DANA 4000 - Rp 4.000</option>
                    <option value="5000">DANA 5000 - Rp 5.000</option>
                    <option value="10000">DANA 10.000 - Rp 10.000</option>
                    <option value="20000">DANA 20.000 - Rp 20.000</option>
                    <option value="25000">DANA 25.000 - Rp 25.000</option>
                    <option value="50000">DANA 50.000 - Rp 50.000</option>
                    <option value="75000">DANA 75.000 - Rp 75.000</option>
                    <option value="100000">DANA 100.000 - Rp 100.000</option>

                    <!-- ========================================== -->
                    <!-- LIST GOPAY -->
                    <!-- ========================================== -->
                    <option value="1000">GOPAY 1000 - Rp 1.000</option>
                    <option value="2000">GOPAY 2000 - Rp 2.000</option>
                    <option value="3000">GOPAY 3000 - Rp 3.000</option>
                    <option value="4000">GOPAY 4000 - Rp 4.000</option>
                    <option value="5000">GOPAY 5000 - Rp 5.000</option>
                    <option value="10000">GOPAY 10.000 - Rp 10.000</option>
                    <option value="20000">GOPAY 20.000 - Rp 20.000</option>
                    <option value="25000">GOPAY 25.000 - Rp 25.000</option>
                    <option value="50000">GOPAY 50.000 - Rp 50.000</option>
                    <option value="75000">GOPAY 75.000 - Rp 75.000</option>
                    <option value="100000">GOPAY 100.000 - Rp 100.000</option>

                    <!-- ========================================== -->
                    <!-- LIST OVO -->
                    <!-- ========================================== -->
                    <option value="1000">OVO 1000 - Rp 1.000</option>
                    <option value="2000">OVO 2000 - Rp 2.000</option>
                    <option value="3000">OVO 3000 - Rp 3.000</option>
                    <option value="4000">OVO 4000 - Rp 4.000</option>
                    <option value="5000">OVO 5000 - Rp 5.000</option>
                    <option value="10000">OVO 10.000 - Rp 10.000</option>
                    <option value="20000">OVO 20.000 - Rp 20.000</option>
                    <option value="25000">OVO 25.000 - Rp 25.000</option>
                    <option value="50000">OVO 50.000 - Rp 50.000</option>
                    <option value="75000">OVO 75.000 - Rp 75.000</option>
                    <option value="100000">OVO 100.000 - Rp 100.000</option>

                    <!-- ========================================== -->
                    <!-- LIST PULSA -->
                    <!-- ========================================== -->
                    <option value="5000">Pulsa 5.000 - Rp 5.000</option>
                    <option value="10000">Pulsa 10.000 - Rp 10.000</option>
                    <option value="15000">Pulsa 15.000 - Rp 15.000</option>
                    <option value="20000">Pulsa 20.000 - Rp 20.000</option>
                    <option value="25000">Pulsa 25.000 - Rp 25.000</option>
                    <option value="30000">Pulsa 30.000 - Rp 30.000</option>
                    <option value="50000">Pulsa 50.000 - Rp 50.000</option>
                    <option value="75000">Pulsa 75.000 - Rp 75.000</option>
                    <option value="100000">Pulsa 100.000 - Rp 100.000</option>

                    <!-- ========================================== -->
                    <!-- LIST TOKEN LISTRIK -->
                    <!-- ========================================== -->
                    <option value="5000">Token Listrik Rp 5.000 - Rp 5.000</option>
                    <option value="10000">Token Listrik Rp 10.000 - Rp 10.000</option>
                    <option value="15000">Token Listrik Rp 15.000 - Rp 15.000</option>
                    <option value="20000">Token Listrik Rp 20.000 - Rp 20.000</option>
                    <option value="50000">Token Listrik Rp 50.000 - Rp 50.000</option>
                    <option value="100000">Token Listrik Rp 100.000 - Rp 100.000</option>
                    <option value="200000">Token Listrik Rp 200.000 - Rp 200.000</option>
                    <option value="500000">Token Listrik Rp 500.000 - Rp 500.000</option>
                    <option value="1000000">Token Listrik Rp 1.000.000 - Rp 1.000.000</option>
                </select>
            </div>

            <!-- ========================================== -->
            <!-- KOLOM KHUSUS TOKEN LISTRIK (OTOMATIS MUNCUL) -->
            <!-- ========================================== -->
            <div id="plnFields" class="hidden space-y-4 mt-2">
                <div>
                    <label class="text-sm font-medium text-orange-600">⚡ No. Meter / ID Pelanggan</label>
                    <input type="text" id="no_meter" placeholder="Masukkan No Meter / ID Pelanggan" class="w-full p-3 border rounded-lg">
                </div>
                <div>
                    <label class="text-sm font-medium text-orange-600">📞 Nomor Telepon</label>
                    <input type="text" id="no_hp" placeholder="Masukkan Nomor HP" class="w-full p-3 border rounded-lg">
                </div>
            </div>

            <div>
                <label class="text-sm font-medium">Kode Promo</label>
                <input type="text" id="promo" placeholder="Masukkan kode jika ada" class="w-full p-3 border rounded-lg">
                <button onclick="cekPromo()" class="text-blue-600 text-sm mt-1">
                    <i class="fas fa-ticket-alt"></i> Cek Promo
                </button>
                <span id="promoText" class="text-sm text-green-600 ml-2"></span>
            </div>

            <hr class="my-2">
            
            <div class="space-y-2 text-sm">
                <div class="flex justify-between">
                    <span>Harga Awal</span>
                    <span id="hargaAwal">Rp 0</span>
                </div>
                <div class="flex justify-between text-orange-500">
                    <span>Biaya Admin / Fee</span>
                    <span>+ Rp 1.500</span>
                </div>
                <div id="rowDiskon" class="hidden flex justify-between text-green-600">
                    <span>Diskon Promo</span>
                    <span id="potongan">- Rp 0</span>
                </div>
                <div class="flex justify-between font-bold text-lg border-t pt-2">
                    <span>Total Bayar</span>
                    <span id="totalBayar">Rp 0</span>
                </div>
            </div>

            <!-- PILIHAN METODE BAYAR -->
            <div class="mt-4">
                <h3 class="font-semibold mb-3">Pilih Metode Pembayaran:</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="pilihMetode('dana')" class="border p-3 rounded-lg bg-blue-50 border-blue-300">
                        <i class="fas fa-wallet text-blue-600"></i> Transfer DANA
                    </button>
                    <button onclick="pilihMetode('qris')" class="border p-3 rounded-lg bg-purple-50 border-purple-300">
                        <i class="fas fa-qrcode text-purple-600"></i> QRIS
                    </button>
                </div>
            </div>

            <!-- INFO REKENING DANA -->
            <div id="boxDana" class="bg-blue-50 p-4 rounded-lg text-center border border-blue-200 mt-4 hidden">
                <p class="font-bold text-blue-800 mb-2">💰 LUNASIKAN KE DANA:</p>
                <div class="bg-white p-3 rounded-lg border border-blue-100">
                    <p class="text-lg font-bold text-blue-700">DANA: 083178509560</p>
                    <p class="text-md font-semibold text-gray-700">A/N: akhyaren</p>
                </div>
            </div>

            <!-- BOX QRIS -->
            <div id="boxQris" class="bg-purple-50 p-4 rounded-lg text-center border border-purple-200 mt-4 hidden">
                <p class="font-bold text-purple-800 mb-2">📱 SCAN QRIS UNTUK BAYAR</p>
                <div class="bg-white p-4 rounded-lg border border-purple-100 inline-block">
                    <div id="qrisContainer" class="w-48 h-48 mx-auto bg-gray-100 flex items-center justify-center">
                        <span class="text-sm text-gray-500">QR Akan Muncul Disini</span>
                    </div>
                    <p class="text-xs mt-2 text-gray-500">Scan pakai Gojek, Dana, OVO, ShopeePay</p>
                </div>
            </div>

            <button onclick="kirimPesanan()" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-bold transition">
                <i class="fas fa-paper-plane"></i> KONFIRMASI PESANAN
            </button>

            <!-- TOMBOL KIRIM BUKTI -->
            <div class="mt-4 pt-4 border-t">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-image text-green-600"></i> Upload Bukti Pembayaran
                </label>
                <input type="file" id="buktiImg" accept="image/*" class="w-full text-sm border p-2 rounded-lg">
                <button onclick="kirimBukti()" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-semibold">
                    <i class="fas fa-upload"></i> KIRIM BUKTI TRANSAKSI
                </button>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const FEE_ADMIN = 1500;
        let diskon = 0;
        let metodeBayar = "dana";

                window.onload = function() {
            hitungHarga();
            const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
            if(!user) {
                alert('Silakan Login Dulu!');
                window.location.href = 'login.html';
            }
        }

        function hitungHarga() {
            const hargaDasar = parseInt(document.getElementById('product').value);
            const total = hargaDasar + FEE_ADMIN - diskon;

            document.getElementById('hargaAwal').textContent = formatRupiah(hargaDasar);
            document.getElementById('totalBayar').textContent = formatRupiah(total);

            // Update QRIS kalau metode aktif
            if(metodeBayar === 'qris') {
                generateQRIS(total);
            }
        }

        function cekPromo() {
            const kode = document.getElementById('promo').value.trim().toUpperCase();
            const listPromo = JSON.parse(localStorage.getItem('promoCodes') || '["PROMO500", "HEMAT500"]');

            if(listPromo.includes(kode)) {
                diskon = 500;
                document.getElementById('promoText').textContent = "✅ Promo Aktif! Potongan Rp 500";
                document.getElementById('rowDiskon').style.display = "flex";
                document.getElementById('potongan').textContent = "- Rp 500";
            } else {
                diskon = 0;
                document.getElementById('promoText').textContent = "❌ Kode tidak valid";
                document.getElementById('rowDiskon').style.display = "none";
            }
            hitungHarga();
        }

        // CEK JIKA PILIH TOKEN LISTRIK
        document.getElementById('product').addEventListener('change', function() {
            const selectedText = this.options[this.selectedIndex].text;
            const plnFields = document.getElementById('plnFields');

            if(selectedText.includes("Token Listrik")) {
                plnFields.classList.remove('hidden');
            } else {
                plnFields.classList.add('hidden');
            }
        });

        function pilihMetode(metode) {
            metodeBayar = metode;
            document.getElementById('boxDana').classList.add('hidden');
            document.getElementById('boxQris').classList.add('hidden');

            if(metode === 'dana') {
                document.getElementById('boxDana').classList.remove('hidden');
            } else {
                document.getElementById('boxQris').classList.remove('hidden');
                const totalHarga = parseInt(document.getElementById('product').value) + FEE_ADMIN - diskon;
                generateQRIS(totalHarga);
            }
        }

        // FUNGSI BUAT QR CODE
        function generateQRIS(nominal) {
            const container = document.getElementById('qrisContainer');
            container.innerHTML = ""; // Hapus lama
            
            // Data QR untuk transfer ke DANA 083178509560
            const dataQR = `dana://transfer?phone=083178509560&amount=${nominal}`;

            new QRCode(container, {
                text: dataQR,
                width: 192,
                height: 192,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function kirimPesanan() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            const target = document.getElementById('target').value;
            const noMeter = document.getElementById('no_meter') ? document.getElementById('no_meter').value : '';
            const noHp = document.getElementById('no_hp') ? document.getElementById('no_hp').value : '';
            const productSelect = document.getElementById('product');
            const productName = productSelect.options[productSelect.selectedIndex].text;
            const productPrice = parseInt(productSelect.value);
            const totalBayar = productPrice + FEE_ADMIN - diskon;

            if(!target) {
                alert('Masukkan ID / Nomor Tujuan!');
                return;
            }

            // Cek jika token listrik tapi belum isi data
            if(productName.includes("Token Listrik")) {
                if(!noMeter || !noHp) {
                    alert('Mohon isi No Meter dan Nomor HP terlebih dahulu!');
                    return;
                }
            }

            const history = JSON.parse(localStorage.getItem('transactions') || '[]');
            history.unshift({
                id: Date.now(),
                nama: user.name,
                produk: productName,
                target: target,
                no_meter: noMeter,
                no_hp: noHp,
                total: totalBayar,
                metode: metodeBayar,
                waktu: new Date().toLocaleString()
            });
            localStorage.setItem('transactions', JSON.stringify(history));

            let detailTambahan = "";
            if(productName.includes("Token Listrik")) {
                detailTambahan = `\nNo Meter: ${noMeter}\nNo HP: ${noHp}`;
            }

            const subject = encodeURIComponent(`Pesanan Baru dari ${user.name}`);
            const body = encodeURIComponent(`
                ADA PEMBELIAN BARU!

                Data Pembeli:
                Nama: ${user.name}

                Detail Pesanan:
                Produk: ${productName}
                ID/Nomor: ${target}
                ${detailTambahan}
                Metode Bayar: ${metodeBayar.toUpperCase()}
                Total Bayar: Rp ${totalBayar.toLocaleString()}

                Terima Kasih!
            `);

            window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${ADMIN_EMAIL_TARGET}&su=${subject}&body=${body}`, '_blank');
            alert('Pesanan Terkirim! Silakan Lakukan Pembayaran.');
        }

        function kirimBukti() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            const fileInput = document.getElementById('buktiImg');
            
            if(fileInput.files.length == 0) {
                alert('Pilih gambar bukti transfer dulu!');
                return;
            }

            const subject = encodeURIComponent(`BUKTI BAYAR - ${user.name}`);
            const body = encodeURIComponent(`Berikut bukti pembayaran dari ${user.name}`);

            window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${ADMIN_EMAIL_TARGET}&su=${subject}&body=${body}`, '_blank');
            alert('Silakan lampirkan gambar di Gmail lalu kirim.');
        }

        function formatRupiah(angka) {
            return 'Rp ' + angka.toLocaleString('id-ID');
        }
    </script>

</body>
</html>
