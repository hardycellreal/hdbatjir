<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E40AF',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">📝 Buat Akun Baru</h2>
            <p class="text-gray-500">Sudah punya akun? <a href="login.html" class="text-primary font-semibold">Login disini</a></p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                <input type="text" id="name" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
            </div>

            <button type="submit" class="w-full bg-primary hover:bg-blue-700 text-white py-3 rounded-lg font-bold transition">
                <i class="fas fa-user-plus mr-2"></i> DAFTAR SEKARANG
            </button>
        </form>
        
        <div id="loading" class="hidden text-center mt-4">
            <i class="fas fa-spinner fa-spin text-primary text-2xl"></i>
            <p class="text-sm text-gray-600">Menyimpan data ke GitHub...</p>
        </div>
    </div>

    <script>
        // ===== KONFIGURASI GITHUB =====
        const GITHUB_USER = "hardycellreal";      // Ganti sama username kamu
        const GITHUB_REPO = "TopUpMurah";             // Ganti sama nama repo kamu
        const GITHUB_TOKEN = "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";   // Ganti sama Token yang disalin tadi
        const FILE_PATH = "database.json";                // Lokasi file database

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            document.getElementById('loading').classList.remove('hidden');

            try {
                // 1. Ambil data lama dari GitHub
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`);
                const data = await response.json();
                
                let users = [];
                let sha = null;

                if(response.ok) {
                    // Decode content dari base64
                    const content = atob(data.content);
                    users = JSON.parse(content);
                    sha = data.sha; // Wajib ada buat update file
                }

                // 2. Cek username sudah ada atau belum
                const cekUser = users.find(u => u.username === username);
                if(cekUser) {
                    alert('Username sudah dipakai!');
                    document.getElementById('loading').classList.add('hidden');
                    return;
                }

                // 3. Tambah user baru
                users.push({
                    name: name,
                    username: username,
                    password: password,
                    color: "#1E40AF" // Warna default
                });

                // 4. Ubah jadi JSON dan encode base64
                const jsonString = JSON.stringify(users, null, 2);
                const contentEncoded = btoa(unescape(encodeURIComponent(jsonString)));

                // 5. Kirim balik ke GitHub
                const updateResponse = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Tambah user baru: " + username,
                        content: contentEncoded,
                        sha: sha
                    })
                });

                if(updateResponse.ok) {
                    alert('✅ Pendaftaran Berhasil! Data tersimpan di GitHub.');
                    window.location.href = 'login.html';
                } else {
                    throw new Error('Gagal menyimpan');
                }

            } catch (error) {
                alert('❌ Error: ' + error.message);
                console.log(error);
            }

            document.getElementById('loading').classList.add('hidden');
        });
    </script>

</body>
</html>
